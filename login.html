<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColdChain Sentinel – Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">❄️</div>
      <h1>ColdChain Sentinel</h1>
      <p class="subtitle">Secure Smart Clinic Storage System</p>
    </div>

    <form id="loginForm" class="login-form" autocomplete="off">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="admin@clinic.mw"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <div id="loginError" class="error-msg" style="display:none;"></div>

      <button type="submit" id="loginBtn" class="btn-primary btn-full">
        <span id="btnText">Sign In</span>
        <span id="btnSpinner" class="spinner" style="display:none;"></span>
      </button>
    </form>

    <p class="login-footer">
      Malawi Clinic Monitoring System &mdash; Authorised Personnel Only
    </p>
  </div>

  <script>
    // ✅ Login page uses the ANON key (safe for browser — Auth only)
    // Find it in: Supabase Dashboard → Settings → API → Project API Keys
    // ⚠️  Do NOT paste the service role key here.
    const SUPABASE_URL = "https://qcojndalmzrlhfhcinhk.supabase.co";   // ✅ Your Supabase URL here
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjb2puZGFsbXpybGhmaGNpbmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTg3MTAsImV4cCI6MjA4OTc5NDcxMH0.OipZIfHCuui32ltsKmKe7LmRpvOwsvJqORKcu_qxk2s";   // ✅ Anon key — Auth login only

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorEl  = document.getElementById("loginError");
      const btnText  = document.getElementById("btnText");
      const spinner  = document.getElementById("btnSpinner");

      errorEl.style.display = "none";
      btnText.style.display  = "none";
      spinner.style.display  = "inline-block";

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error_description || data.message || "Invalid credentials");
        }

        // Store session
        sessionStorage.setItem("sb_access_token",  data.access_token);
        sessionStorage.setItem("sb_refresh_token", data.refresh_token);
        sessionStorage.setItem("sb_user_email",    email);

        window.location.href = "dashboard.html";

      } catch (err) {
        errorEl.textContent    = err.message;
        errorEl.style.display  = "block";
        btnText.style.display  = "inline";
        spinner.style.display  = "none";
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem("sb_access_token")) {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
